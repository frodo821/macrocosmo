name: Release

on:
  push:
    branches:
      - release

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from workspace Cargo.toml
        id: version
        run: |
          # Workspace root Cargo.toml holds the canonical version under
          # [workspace.package]. Individual crates use `version.workspace = true`.
          VERSION=$(awk '/^\[workspace\.package\]/{flag=1; next} /^\[/{flag=0} flag && /^version/{match($0, /"[^"]+"/); print substr($0, RSTART+1, RLENGTH-2); exit}' Cargo.toml)
          if [ -z "$VERSION" ]; then
            echo "::error::Failed to extract version from [workspace.package] in Cargo.toml"
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Check tag does not exist
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          if git rev-parse "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "::error::Tag ${TAG} already exists. Bump the version in Cargo.toml before merging to release."
            exit 1
          fi
          echo "Tag ${TAG} is available."

  build:
    needs: preflight
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: macrocosmo-macos-aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: macrocosmo-windows-x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: macrocosmo-linux-x86_64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libudev-dev \
            libwayland-dev \
            libxkbcommon-dev \
            libvulkan-dev

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.target }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ matrix.target }}-cargo-

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} -p macrocosmo

      - name: Package (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/macrocosmo dist/
          cp -r macrocosmo/scripts dist/
          cp -r macrocosmo/assets dist/
          tar -czf ${{ matrix.artifact }}.tar.gz -C dist .

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/macrocosmo.exe dist/
          cp -r macrocosmo/scripts dist/
          cp -r macrocosmo/assets dist/
          7z a ${{ matrix.artifact }}.zip dist/*

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: ${{ matrix.os != 'windows-latest' && format('{0}.tar.gz', matrix.artifact) || format('{0}.zip', matrix.artifact) }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.os != 'windows-latest' && format('{0}.tar.gz', matrix.artifact) || format('{0}.zip', matrix.artifact) }}

  release:
    needs: [preflight, build]
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.preflight.outputs.version }}
          name: v${{ needs.preflight.outputs.version }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: |
            artifacts/macrocosmo-macos-aarch64/*.tar.gz
            artifacts/macrocosmo-windows-x86_64/*.zip
            artifacts/macrocosmo-linux-x86_64/*.tar.gz
